appId: com.rckbrcls.slate
productName: Slate
icon: public/slate.png
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: engine/dist
    to: engine
    filter:
      - "slate-engine*"
asar: true
mac:
  icon: build/generated-icons/icon.icns
  target:
    - dmg
win:
  icon: build/generated-icons/icon.ico
  target:
    - nsis
linux:
  icon: public/slate.png
  target:
    - AppImage
