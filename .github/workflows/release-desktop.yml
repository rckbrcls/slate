name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional package version override (ex: 0.1.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Optional version override
        if: ${{ inputs.version != '' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          VERSION: ${{ inputs.version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup uv (engine sidecar)
        uses: astral-sh/setup-uv@v5

      - name: Package engine sidecar
        run: |
          set -euo pipefail
          pnpm engine:package
          rm -rf engine/.venv engine/build
          rm -rf "$HOME/.cache/uv" "$HOME/.cache/pyinstaller" || true
          du -sh engine/dist/* || true
          df -h .

      - name: Build + publish (macOS only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pnpm build
          pnpm exec electron-builder --mac --publish always
