name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Optional package version override (ex: 0.1.1)"
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Engine sidecar (docling/torch) is huge; ship full mac build first.
          # Linux/Windows can be re-enabled once engine packaging is slimmed down.
          - os: macos-latest
            builder_args: --mac
          - os: windows-latest
            builder_args: --win
            skip_engine: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Optional version override
        if: ${{ inputs.version != '' }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          VERSION: ${{ inputs.version }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup uv (engine sidecar)
        if: ${{ matrix.skip_engine != true }}
        uses: astral-sh/setup-uv@v5

      - name: Package engine sidecar
        if: ${{ matrix.skip_engine != true }}
        run: |
          set -euo pipefail
          pnpm engine:package
          # Drop packaging intermediates so electron-builder has free disk.
          rm -rf engine/.venv engine/build
          rm -rf "$HOME/.cache/uv" "$HOME/.cache/pyinstaller" || true
          du -sh engine/dist/* || true
          df -h .

      - name: Stub engine dir (platforms without sidecar)
        if: ${{ matrix.skip_engine == true }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p engine/dist
          # Keep electron-builder extraResources path valid without a multi-GB binary.
          printf '' > engine/dist/.keep

      - name: Build + publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          pnpm build
          df -h .
          pnpm exec electron-builder ${{ matrix.builder_args }} --publish always
